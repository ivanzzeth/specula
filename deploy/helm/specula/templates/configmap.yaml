apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "specula.configMapName" . }}
  labels:
    {{- include "specula.labels" . | nindent 4 }}
data:
  specula.yaml: |
    server:
      data_plane_addr: ":{{ .Values.service.dataPort }}"
      control_plane_addr: ":{{ .Values.service.controlPort }}"
      ha: true

    coalesce:
      lock_driver: redis
      redis:
        addr: {{ include "specula.redis.host" . }}:6379
        db: 0
        key_prefix: "specula:lock:"

    storage:
      blob:
        driver: {{ .Values.blob.driver | quote }}
        {{- if eq .Values.blob.driver "local" }}
        local:
          root: {{ .Values.blob.local.root | quote }}
          shared: true
        {{- else if eq .Values.blob.driver "s3" }}
        s3:
          bucket: {{ .Values.blob.s3.bucket | quote }}
          endpoint: {{ include "specula.blob.s3.endpoint" . | quote }}
          region: {{ .Values.blob.s3.region | quote }}
          use_path_style: {{ .Values.blob.s3.usePathStyle }}
        {{- end }}
      meta:
        driver: postgres
        # Overridden at runtime by SPECULA_STORAGE__META__DSN (password from Secret).
        dsn: "postgres://specula@postgresql:5432/specula?sslmode=disable"

    cache:
      default_mutable_ttl_seconds: {{ .Values.cache.defaultMutableTTLSeconds }}
      negative_ttl_seconds: {{ .Values.cache.negativeTTLSeconds }}
      max_bytes: {{ .Values.cache.maxBytes }}

    auth:
      cookie_secure: {{ .Values.auth.cookieSecure }}

    # Git is omitted in HA: bare mirrors are node-local and not shared across replicas.
    protocols:
{{- if eq .Values.regionProfile "cn" }}
      oci:
        mutable_ttl_seconds: 300
        upstreams:
          - name: daocloud
            base_url: https://docker.m.daocloud.io
            priority: 1
            official: false
          - name: aliyun
            base_url: https://registry.aliyuncs.com
            priority: 2
            official: false
          - name: docker-hub
            base_url: https://registry-1.docker.io
            priority: 3
            official: true
        verification:
          tiers: [tofu, checksum]
          quorum: 2
      go:
        mutable_ttl_seconds: 300
        upstreams:
          - name: goproxy-cn
            base_url: https://goproxy.cn
            priority: 1
            official: false
          - name: goproxy-io
            base_url: https://goproxy.io
            priority: 2
            official: false
          - name: golang-proxy
            base_url: https://proxy.golang.org
            priority: 3
            official: true
        verification:
          tiers: [signed, tofu, checksum]
          quorum: 1
        sumdb:
          url: https://sum.golang.google.cn
          policy: enforce
      pypi:
        mutable_ttl_seconds: 1800
        upstreams:
          - name: tuna
            base_url: https://pypi.tuna.tsinghua.edu.cn
            priority: 1
            official: false
          - name: aliyun
            base_url: https://mirrors.aliyun.com/pypi
            priority: 2
            official: false
          - name: pypi-org
            base_url: https://pypi.org
            priority: 3
            official: true
        verification:
          tiers: [consensus, tofu, checksum]
          quorum: 2
          tofu: enforce
      npm:
        mutable_ttl_seconds: 120
        upstreams:
          - name: npmmirror
            base_url: https://registry.npmmirror.com
            priority: 1
            official: false
          - name: npm-registry
            base_url: https://registry.npmjs.org
            priority: 2
            official: true
        verification:
          tiers: [consensus, tofu, checksum]
          quorum: 2
          tofu: enforce
      helm:
        mutable_ttl_seconds: 1800
        upstreams:
          - name: bitnami
            base_url: https://charts.bitnami.com/bitnami
            priority: 1
            official: true
        verification:
          tiers: [tofu, checksum]
          quorum: 1
          tofu: enforce
      apt:
        mutable_ttl_seconds: 0
        upstreams:
          - name: tuna
            base_url: https://mirrors.tuna.tsinghua.edu.cn/ubuntu
            priority: 1
            official: false
          - name: aliyun
            base_url: https://mirrors.aliyun.com/ubuntu
            priority: 2
            official: false
          - name: ubuntu-archive
            base_url: https://archive.ubuntu.com/ubuntu
            priority: 3
            official: true
        verification:
          tiers: [signed, tofu, checksum]
          quorum: 1
          tofu: enforce
      cargo:
        mutable_ttl_seconds: 300
        upstreams:
          - name: rsproxy-index
            base_url: https://rsproxy.cn/index
            priority: 1
            official: false
          - name: index-crates-io
            base_url: https://index.crates.io
            priority: 2
            official: true
        cargo:
          dl_upstreams:
            - name: ustc-crates
              base_url: https://mirrors.ustc.edu.cn/crates.io
              priority: 1
              official: false
            - name: static-crates-io
              base_url: https://static.crates.io
              priority: 2
              official: true
        verification:
          tiers: [tofu, checksum]
          quorum: 1
          tofu: enforce
      conda:
        mutable_ttl_seconds: 300
        upstreams:
          - name: tuna-cloud
            base_url: https://mirrors.tuna.tsinghua.edu.cn/anaconda/cloud
            priority: 1
            official: false
          - name: anaconda-cloud
            base_url: https://conda.anaconda.org
            priority: 2
            official: true
        verification:
          tiers: [checksum, tofu]
          quorum: 1
          tofu: enforce
      hf:
        mutable_ttl_seconds: 120
        upstreams:
          - name: hf-mirror
            base_url: https://hf-mirror.com
            priority: 1
            official: false
          - name: huggingface
            base_url: https://huggingface.co
            priority: 2
            official: true
        verification:
          tiers: [tofu, checksum]
          quorum: 1
          tofu: enforce
{{- else }}
      oci:
        mutable_ttl_seconds: 300
        upstreams:
          - name: docker-hub
            base_url: https://registry-1.docker.io
            priority: 1
            official: true
        verification:
          tiers: [tofu, checksum]
          quorum: 1
          tofu: enforce
      go:
        mutable_ttl_seconds: 300
        upstreams:
          - name: proxy.golang.org
            base_url: https://proxy.golang.org
            priority: 1
            official: true
        verification:
          tiers: [signed, tofu, checksum]
          quorum: 1
        sumdb:
          url: https://sum.golang.org
          policy: enforce
      pypi:
        mutable_ttl_seconds: 1800
        upstreams:
          - name: pypi-org
            base_url: https://pypi.org
            priority: 1
            official: true
        verification:
          tiers: [tofu, checksum]
          quorum: 1
          tofu: enforce
      npm:
        mutable_ttl_seconds: 120
        upstreams:
          - name: npm-registry
            base_url: https://registry.npmjs.org
            priority: 1
            official: true
        verification:
          tiers: [tofu, checksum]
          quorum: 1
          tofu: enforce
      helm:
        mutable_ttl_seconds: 1800
        upstreams:
          - name: bitnami
            base_url: https://charts.bitnami.com/bitnami
            priority: 1
            official: true
        verification:
          tiers: [tofu, checksum]
          quorum: 1
          tofu: enforce
      apt:
        mutable_ttl_seconds: 0
        upstreams:
          - name: ubuntu-archive
            base_url: https://archive.ubuntu.com/ubuntu
            priority: 1
            official: true
        verification:
          tiers: [signed, tofu, checksum]
          quorum: 1
          tofu: enforce
      cargo:
        mutable_ttl_seconds: 300
        upstreams:
          - name: index-crates-io
            base_url: https://index.crates.io
            priority: 1
            official: true
        cargo:
          dl_upstreams:
            - name: static-crates-io
              base_url: https://static.crates.io
              priority: 1
              official: true
        verification:
          tiers: [tofu, checksum]
          quorum: 1
          tofu: enforce
      conda:
        mutable_ttl_seconds: 300
        upstreams:
          - name: anaconda-cloud
            base_url: https://conda.anaconda.org
            priority: 1
            official: true
        verification:
          tiers: [checksum, tofu]
          quorum: 1
          tofu: enforce
      hf:
        mutable_ttl_seconds: 120
        upstreams:
          - name: huggingface
            base_url: https://huggingface.co
            priority: 1
            official: true
        verification:
          tiers: [tofu, checksum]
          quorum: 1
          tofu: enforce
{{- end }}
      tarball:
        mutable_ttl_seconds: -1
        upstreams:
          - name: github
            base_url: https://github.com
            priority: 1
            official: true
        verification:
          tiers: [tofu, checksum]
          quorum: 1
          tofu: enforce
