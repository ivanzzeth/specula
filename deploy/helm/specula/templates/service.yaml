apiVersion: v1
kind: Service
metadata:
  name: {{ include "specula.fullname" . }}
  labels:
    {{- include "specula.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "specula.selectorLabels" . | nindent 4 }}
  ports:
    - name: data
      port: {{ .Values.service.dataPort }}
      targetPort: data
      protocol: TCP
    - name: control
      port: {{ .Values.service.controlPort }}
      targetPort: control
      protocol: TCP
