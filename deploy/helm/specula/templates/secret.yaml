apiVersion: v1
kind: Secret
metadata:
  name: {{ include "specula.secretName" . }}
  labels:
    {{- include "specula.labels" . | nindent 4 }}
type: Opaque
stringData:
  config-secret: {{ required "auth.configSecret must be set (openssl rand -base64 32)" .Values.auth.configSecret | quote }}
  {{- if .Values.auth.jwtSecret }}
  jwt-secret: {{ .Values.auth.jwtSecret | quote }}
  {{- end }}
