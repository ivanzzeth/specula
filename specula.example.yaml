# specula.example.yaml — reference configuration for Specula v0.2
#
# Copy to specula.yaml and edit for your environment.
# Local/dev data defaults to ~/.specula (blobs, meta.db, git mirrors).
# Containers and `specula service install` use /var/lib/specula instead.
# Any value can be overridden with an environment variable:
#   SPECULA_<LEVEL>__<KEY>=value
# Example: SPECULA_AUTH__JWT_SECRET=my-secret
#
# TTL sentinels (from DESIGN-REVIEW §3, mirrors Nexus convention):
#   -1 = never revalidate (treat as immutable, permanent cache)
#    0 = revalidate on every request
#   >0 = cache for N seconds
#
# Trust tier hierarchy (honest tiered trust, ARCHITECTURE §5):
#   signed     → cryptographic anchor (apt keyring / Go sumdb / cosign keyed / Helm .prov / git signed tag)
#   consensus  → cross-source quorum (N independent mirrors agree on digest)
#   tofu       → first-use pin + change alert (including git force-push / history rewrite detection)
#   checksum   → transport integrity only (prevents bit-rot, NOT a supply-chain guarantee)

# ── Server ────────────────────────────────────────────────────────────────────
server:
  # Data plane: all protocol handlers, no consumer auth.
  # Configure your network policy / mTLS / firewall at the perimeter.
  # Ports 7732/7733: "SPEC" on a phone keypad (S=7 P=7 E=3 C=2) — Specula, and
  # the specs this proxy exists to conform to. Deliberately NOT 5000/8080:
  #   - 5000 is the Docker registry / zot default, i.e. the single most likely
  #     thing to already be running on a host that wants an OCI cache;
  #   - 8080 needs no explanation;
  #   - 7760-7766 is avoided too (a common pull-through-cache stack sits there).
  # Bind 0.0.0.0 so LAN / other hosts can reach the daemon (not loopback-only).
  data_plane_addr: "0.0.0.0:7732"

  # Control plane: embedded WebUI + Admin API (email auth, first user = admin).
  control_plane_addr: "0.0.0.0:7733"

  # Multi-replica HA mode: requires postgres meta, redis stampede lock
  # (coalesce.lock_driver=redis), and shared CAS (blob.driver=s3 OR
  # blob.driver=local with local.shared=true on a PVC/NFS). Git stays
  # single-node (node-local mirrors) — disable git in HA Deployment values.
  # ha: false

  # Runtime mode: online (default) or offline. Offline serves only already-cached
  # artifacts — no upstream Fetch and no git mirror clone/refresh; misses are 404.
  # Warm the cache while online, then restart with mode: offline for air-gap.
  # mode: online

# ── Coalesce (cross-replica cold-fetch stampede lock) ─────────────────────────
# Empty / omitted = in-process singleflight only (fine for DaemonSet / single node).
# HA deployments must set lock_driver: redis (go-redsync/redsync over go-redis).
# coalesce:
#   lock_driver: redis
#   redis:
#     addr: redis.internal:6379
#     password: ""
#     db: 0
#     key_prefix: "specula:lock:"

# ── Storage ───────────────────────────────────────────────────────────────────
storage:
  blob:
    # CAS blob store driver: "local" or "s3"
    driver: local
    local:
      # Content-addressed directory tree.  Specula writes blobs as
      # <root>/<first2hex>/<digest_hex> and hard-links duplicates.
      # Default for local/dev: ~/.specula (no root required). Containers and
      # `specula service install` rewrite this to /var/lib/specula.
      root: ~/.specula/blobs
      # Set true when server.ha and this root is a shared PVC/NFS (not emptyDir).
      # shared: false

    # Uncomment and set driver: s3 to use S3-compatible object storage.
    # s3:
    #   bucket: specula-blobs
    #   endpoint: https://minio.internal:9000   # empty = AWS S3
    #   region: us-east-1
    #   access_key_id: ""       # empty → SDK credential chain (IAM role / env)
    #   secret_access_key: ""
    #   use_path_style: true    # required for MinIO; false for AWS S3

  meta:
    # Metadata store driver: "sqlite" (single-node) or "postgres" (HA).
    # SQLite: WAL mode; use only for DaemonSet / single-instance deployments.
    # Postgres: concurrent-safe ON CONFLICT upsert; required when server.ha.
    driver: sqlite
    dsn: ~/.specula/meta.db

    # PostgreSQL example:
    # driver: postgres
    # dsn: postgres://specula:changeme@pg.internal:5432/specula?sslmode=require

# ── Cache ─────────────────────────────────────────────────────────────────────
cache:
  # Fallback mutable TTL used when a protocol does not set its own.
  # Mutable metadata = tags, index pages, packuments, refs.
  # -1 = never revalidate | 0 = always revalidate | >0 = seconds
  default_mutable_ttl_seconds: 300   # 5 minutes

  # How long to cache 404 (Not Found) responses.
  # 0 = do not cache 404s; >0 = cache for N seconds.
  # Matches Artifactory default (1800s) to absorb miss-stampedes.
  negative_ttl_seconds: 1800

  # Hard ceiling on total immutable cache bytes (SUM of verified CAS entries).
  # 0 = unlimited (default). When a Store would push usage above this, Specula
  # evicts the oldest unpinned entries (meta + blob) until under the limit.
  # Pinned entries (Admin API / WebUI) are never evicted. A single artifact
  # larger than max_bytes is still stored; the cache may remain over-cap until
  # enough other entries become evictable.
  # Example: 10737418240  # 10 GiB
  max_bytes: 0

# ── Auth (control plane) ──────────────────────────────────────────────────────
auth:
  # AES-256-GCM master key for the encrypted runtime-settings store: base64 of
  # exactly 32 bytes. Generate one with:  openssl rand -base64 32
  #
  # This is what makes the secrets below durable and HA-safe. With it set, an
  # auto-generated jwt_secret / registry token key is written (encrypted) to the
  # database, so it survives restarts AND is shared by every replica.
  #
  # Empty = the store is DISABLED: runtime settings become read-only and
  # auto-generated secrets are ephemeral (sessions die on restart and are not
  # valid across replicas). Fine for local dev; set it in production.
  #
  # A non-empty but malformed value is a startup ERROR, never a silent downgrade.
  #
  # Keep it OUT of the database it protects: prefer the environment variable
  # SPECULA_AUTH__CONFIG_SECRET, sourced from a secret manager, over this file.
  config_secret: ""

  # HS256 JWT signing key for session cookies.
  # Leave empty to auto-generate on first start and persist (encrypted) to the
  # DB — which requires config_secret above. Without config_secret the generated
  # secret is EPHEMERAL and every restart signs all users out.
  # Changing this invalidates all existing sessions.
  # Also settable at runtime under Config → System Settings, and overridable via
  # SPECULA_AUTH__JWT_SECRET.
  jwt_secret: ""

  # Set true when the control plane is served over HTTPS.
  # This sets the Secure flag on the session cookie.
  cookie_secure: false

# ── Protocols ─────────────────────────────────────────────────────────────────
# Each key is the protocol name used internally and in metrics/logs.
# Supported: oci, pypi, npm, go, apt, helm, tarball, git
protocols:

  # ── OCI ───────────────────────────────────────────────────────────────────
  oci:
    # Mutable TTL for tag→digest mappings.
    # Harbor lesson (#19429): a long TTL here serves stale manifests.
    # Use HEAD probing (no pull quota consumed) to keep tags fresh.
    mutable_ttl_seconds: 300   # 5 minutes

    upstreams:
      - name: daocloud
        base_url: https://docker.m.daocloud.io
        priority: 1
        official: false
      - name: aliyun
        base_url: https://registry.aliyuncs.com
        priority: 2
        official: false
      - name: docker-hub
        base_url: https://registry-1.docker.io
        priority: 3
        official: true

    verification:
      # Without cosign keys, OCI tops out at consensus or tofu.
      # Copy-paste for signed (CN-safe keyed; tlog MUST stay false):
      #   tiers: [signed, tofu, checksum]
      #   cosign:
      #     keys: [/etc/specula/keys/cosign.pub]
      #     tlog: false
      # Full cookbook: docs/TRUST.md
      tiers: [tofu, checksum]
      quorum: 2
      # cosign_key: /etc/specula/keys/cosign.pub   # legacy single-key alias

    # Multi-registry pull-through (path-style + containerd override_path).
    # Unqualified names (library/nginx) still use upstreams above (Hub chain).
    # Prefixed names (codeberg.org/org/repo) strip the host and fetch from that
    # registry — only hosts listed here are allowed (SSRF allowlist).
    oci:
      remote_registries:
        - host: ghcr.io
        - host: quay.io
        - host: registry.k8s.io
        - host: gcr.io
        - host: codeberg.org
        # - host: mirror.example
        #   base_url: https://mirror.example

  # ── PyPI ──────────────────────────────────────────────────────────────────
  pypi:
    # PyPI is a flat namespace — dependency confusion is a structural risk.
    # Specula acts as the SOLE index; clients use only --index-url, never
    # --extra-index-url. Private-name packages are served from private sources
    # only; public-name packages are proxied and TOFU-pinned.
    mutable_ttl_seconds: 1800   # 30 minutes (devpi default)

    upstreams:
      - name: tuna
        base_url: https://pypi.tuna.tsinghua.edu.cn
        priority: 1
        official: false
      - name: aliyun
        base_url: https://mirrors.aliyun.com/pypi
        priority: 2
        official: false
      - name: pypi-org
        base_url: https://pypi.org
        priority: 3
        official: true

    verification:
      # PEP 740 attestations use Sigstore/Rekor (blocked in CN) with ~5% coverage.
      # Best achievable in CN: consensus quorum + TOFU.
      tiers: [consensus, tofu, checksum]
      quorum: 2
      tofu: enforce   # pin digest on first fetch; alert on later change
      # Dependency-confusion guard (DESIGN-REVIEW §4 / docs/TRUST.md):
      # PyPI is a FLAT namespace — list exact private names you own.
      # dependency_confusion:
      #   private_names: ["corp-internal", "corp-lib"]
      #   private_upstream: https://pypi.internal.example.com/simple
      #   on_private_down: fail_closed   # never fall back to a public mirror

  # ── npm ───────────────────────────────────────────────────────────────────
  npm:
    # Scoped packages (@org/pkg) are immune to dependency confusion by design.
    # Unscoped private packages must be listed in a denylist (no upstream query).
    mutable_ttl_seconds: 120   # 2 minutes (verdaccio default)

    upstreams:
      - name: npmmirror
        base_url: https://registry.npmmirror.com
        priority: 1
        official: false
      - name: npm-registry
        base_url: https://registry.npmjs.org
        priority: 2
        official: true

    verification:
      # npm provenance uses Sigstore/Rekor (blocked in CN) with ~3–12% coverage.
      # Best achievable: consensus + TOFU.
      tiers: [consensus, tofu, checksum]
      quorum: 2
      tofu: enforce
      # Dependency-confusion guard (docs/TRUST.md): scopes are resistant by
      # design; unscoped private names need an explicit denylist.
      # dependency_confusion:
      #   private_scopes: ["@myorg"]
      #   private_unscoped: ["internal-svc"]
      #   private_upstream: https://npm.internal.example.com
      #   on_private_down: fail_closed

  # ── Go modules ────────────────────────────────────────────────────────────
  go:
    # Go modules use domain-scoped paths — structurally immune to dependency
    # confusion. sumdb provides Ed25519-signed Merkle tree proofs.
    # Routed via sum.golang.google.cn or /sumdb/ endpoint of goproxy.cn.
    mutable_ttl_seconds: 300   # 5 minutes for @v/list, @latest

    upstreams:
      - name: goproxy-cn
        base_url: https://goproxy.cn
        priority: 1
        official: false
      - name: goproxy-io
        base_url: https://goproxy.io
        priority: 2
        official: false
      - name: golang-proxy
        base_url: https://proxy.golang.org
        priority: 3
        official: true

    verification:
      # sumdb provides signed verification — highest trust in CN.
      tiers: [signed, tofu, checksum]
      quorum: 1
      # sumdb_key pins the Go checksum database public key.
      # Leave empty to use the default key embedded in x/mod.
      sumdb_key: ""

    # sumdb (Go checksum database) verification + /sumdb/ passthrough.
    # NEVER set GOSUMDB=off — policy is enforce | warn only (DESIGN-REVIEW H5).
    sumdb:
      # CN-reachable sumdb: sum.golang.google.cn, or a goproxy.cn /sumdb/ base.
      url: https://sum.golang.google.cn
      # enforce = fail closed on verification failure; warn = degraded tier.
      policy: enforce
      # GONOSUMDB globs (Athens NoSumPatterns): matching module names are never
      # forwarded to the public sumdb; /sumdb/ lookups for them return 403.
      private_patterns:
        - git.internal.corp/*
      # verifier_key pins the sumdb note verifier key; empty = x/mod default.
      verifier_key: ""

  # ── apt ───────────────────────────────────────────────────────────────────
  apt:
    # apt uses GPG-signed InRelease → Packages → per-file SHA256 chain.
    # This is end-to-end verifiable (transport-agnostic) even through Specula.
    # The distro keyring is obtained out-of-band and cannot be forged by a mirror.
    mutable_ttl_seconds: 0   # always revalidate: InRelease has its own expiry field

    # Default fallback chain used when the path has no archive prefix
    # (/apt/dists/…) or when apt.repositories is empty (legacy).
    upstreams:
      - name: tuna
        base_url: https://mirrors.tuna.tsinghua.edu.cn/ubuntu
        priority: 1
        official: false
      - name: aliyun
        base_url: https://mirrors.aliyun.com/ubuntu
        priority: 2
        official: false
      - name: ubuntu-archive
        base_url: https://archive.ubuntu.com/ubuntu
        priority: 3
        official: true

    # Multi-archive allowlist: /apt/<name>/dists|pool/… routes to that archive
    # root (path strip). Unknown names → 404. Empty list → legacy single-root.
    apt:
      repositories:
        - name: ubuntu
          base_url: https://mirrors.tuna.tsinghua.edu.cn/ubuntu
        - name: debian
          base_url: https://mirrors.tuna.tsinghua.edu.cn/debian

    verification:
      tiers: [signed, tofu, checksum]
      quorum: 1
      tofu: enforce
      # apt is a full "signed" anchor: the distro keyring is shipped out-of-band
      # with the OS and cannot be forged by a mirror. Set keyring to enable it.
      gpg:
        policy: enforce
        # Distro keyring is out-of-band (mirror cannot forge it). On Ubuntu/Debian
        # hosts the archive keyring is usually already present; copy it into the
        # Specula image/VM if the daemon filesystem differs. See docs/TRUST.md.
        keyring: /usr/share/keyrings/ubuntu-archive-keyring.gpg

  # ── Helm ──────────────────────────────────────────────────────────────────
  helm:
    # Classic HTTP repo mode: index.yaml + tgz + optional .prov GPG signature.
    # OCI-format Helm charts are handled by the oci protocol above.
    mutable_ttl_seconds: 1800   # 30 minutes for index.yaml

    # Default fallback for flat layout (/helm/index.yaml) when repositories empty.
    upstreams:
      - name: bitnami
        base_url: https://charts.bitnami.com/bitnami
        priority: 1
        official: true

    # Multi-repo allowlist: /helm/<name>/index.yaml routes to that chart root
    # (path strip). Unknown names → 404. Empty list → legacy subpath under upstreams.
    helm:
      repositories:
        - name: bitnami
          base_url: https://charts.bitnami.com/bitnami
        - name: prometheus-community
          base_url: https://prometheus-community.github.io/helm-charts

    verification:
      # .prov GPG signature provides "signed" tier when keyring is configured.
      tiers: [tofu, checksum]
      quorum: 1
      tofu: enforce
      # Helm chart provenance (.prov) is a detached GPG signature. Public CN
      # mirrors usually publish NONE — keep warn so missing .prov degrades to tofu.
      # When you control a signing repo, point keyring at publisher keys (docs/TRUST.md).
      provenance:
        policy: warn
        # keyring: /etc/specula/keyrings/helm-signing.gpg

  # ── Tarball ───────────────────────────────────────────────────────────────
  tarball:
    # URL-keyed generic download cache. Content is addressed by sha256 digest.
    # No mutable layer: every URL maps to one digest; re-fetch on cache miss.
    mutable_ttl_seconds: -1   # immutable once cached

    upstreams:
      - name: default
        base_url: https://github.com
        priority: 1
        official: true

    verification:
      # tarball upstreams rarely advertise digests for cross-mirror consensus —
      # prefer tofu (immutable pin) unless you configure multiple digest-capable mirrors.
      tiers: [tofu, checksum]
      quorum: 1
      tofu: enforce   # tarball content is immutable once cached; pin its digest

  # ── git ───────────────────────────────────────────────────────────────────
  git:
    # Public git clone acceleration via bare mirrors (git http-backend CGI).
    # Push / Authorization-bearing requests are passed through without caching.
    # refs (branch→SHA) are the mutable layer; git objects are immutable by SHA.
    mutable_ttl_seconds: 30   # 30 seconds for refs

    # git does NOT use the generic upstream fallback chain — it mirrors /
    # reverse-proxies the allowed hosts directly. The upstreams block below is
    # kept only to satisfy generic per-protocol validation; allowed_upstreams
    # under `git:` is the authoritative host allowlist.
    upstreams:
      - name: github
        base_url: https://github.com
        priority: 1
        official: true
      - name: gitee
        base_url: https://gitee.com
        priority: 2
        official: false

    # git-specific bare-mirror settings (ARCHITECTURE §9, PRD §6).
    git:
      allowed_upstreams: [github.com, gitlab.com, gitee.com, codeberg.org, git.sr.ht, bitbucket.org]
      mirror_dir: ~/.specula/git
      sync_stale_after: 30s    # reuse a mirror within this window; concurrent-clone-safe
      public_only: true        # private repos / Authorization-bearing → passthrough, no cache
      fail_closed: true        # probe failure → passthrough (never serve a stale public copy)

    verification:
      # tofu: pins ref→SHA on first fetch; alerts on non-fast-forward updates
      # (force-push / history rewrite detection per ARCHITECTURE §5).
      # signed: verifies signed tags/commits via allowed_signers when configured.
      tiers: [tofu, checksum]
      quorum: 1
      tofu: enforce
      # signed_refs:
      #   policy: warn
      #   allowed_signers: /etc/specula/keys/git-allowed-signers

  # ── Cargo (sparse registry) ───────────────────────────────────────────────
  cargo:
    # Sparse index (RFC 2789). Index JSON is mutable (short TTL + TOFU);
    # .crate files are immutable (checksum; pin when upstream advertises digest).
    mutable_ttl_seconds: 300

    # Sparse index hosts (index.crates.io layout). Prefer official first;
    # rsproxy is a CN-friendly fallback (pair with matching dl_upstreams below).
    upstreams:
      - name: index-crates-io
        base_url: https://index.crates.io
        priority: 1
        official: true
      - name: rsproxy-index
        base_url: https://rsproxy.cn/index
        priority: 2
        official: false

    cargo:
      # .crate download mirrors (static.crates.io layout: /crates/<name>/<name>-<ver>.crate).
      dl_upstreams:
        - name: static-crates-io
          base_url: https://static.crates.io
          priority: 1
          official: true
        - name: rsproxy-dl
          base_url: https://rsproxy.cn
          priority: 2
          official: false

    verification:
      tiers: [tofu, checksum]
      quorum: 1
      tofu: enforce

  # ── conda (channel proxy) ─────────────────────────────────────────────────
  conda:
    # Channel tree: /conda/<channel>/<subdir>/repodata.json (mutable) and
    # /conda/<channel>/<subdir>/<pkg>.{conda,tar.bz2} (immutable; pin sha256 from repodata).
    mutable_ttl_seconds: 300

    # Cloud-root fallback when conda.channels is empty (legacy full-path fetch).
    upstreams:
      - name: tuna-cloud
        base_url: https://mirrors.tuna.tsinghua.edu.cn/anaconda/cloud
        priority: 1
        official: false
      - name: anaconda-cloud
        base_url: https://conda.anaconda.org
        priority: 2
        official: true

    # Per-channel roots: /conda/<name>/… strips <name> and fetches against BaseURL.
    # Unknown channel names → 404 when this list is non-empty.
    conda:
      channels:
        - name: conda-forge
          base_url: https://mirrors.tuna.tsinghua.edu.cn/anaconda/cloud/conda-forge
        - name: bioconda
          base_url: https://mirrors.tuna.tsinghua.edu.cn/anaconda/cloud/bioconda
        - name: pytorch
          base_url: https://mirrors.tuna.tsinghua.edu.cn/anaconda/cloud/pytorch

    verification:
      tiers: [checksum, tofu]
      quorum: 1
      tofu: enforce

  # ── Hugging Face Hub (HF_ENDPOINT compatible) ─────────────────────────────
  hf:
    # Hub-compatible reverse proxy. Set HF_ENDPOINT=http://host:7732/hf
    # Authorization / cookie requests pass through and are not cached (public_only).
    # CDN/LFS URLs in JSON responses are rewritten to /hf/… so traffic stays on Specula.
    mutable_ttl_seconds: 120

    upstreams:
      - name: hf-mirror
        base_url: https://hf-mirror.com
        priority: 1
        official: false
      - name: huggingface
        base_url: https://huggingface.co
        priority: 2
        official: true

    verification:
      tiers: [tofu, checksum]
      quorum: 1
      tofu: enforce
